<!DOCTYPE html>
<html>

<head>
    <title>Spam Detection System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .main-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-wrapper label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #cbd5e1;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 10px;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.95rem;
            resize: none;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background: #1e293b;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .char-counter {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .char-count {
            font-weight: 600;
            color: #3b82f6;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-predict {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-clear:hover {
            background: #475569;
        }

        .btn-delete {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 12px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .result-section {
            margin-top: 30px;
            animation: slideUp 0.5s ease-out;
        }

        .result-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .result-info h3 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .confidence-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 10px;
            transition: width 0.6s ease;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Spam Detector</h1>
            <p>AI-powered email spam detection - Analyze any message instantly</p>
        </div>
        <div class="main-card">
            <!-- <div class="error" id="error"></div> -->
            <form action="/predict" method="POST">
                <div class="input-wrapper">
                    <label for="message">Paste your email or message here</label>
                    <textarea id="message" name="message" placeholder="Enter the email text you want to check..." required></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-predict">
                        <i class="fas fa-check"></i> Check for Spam
                    </button>
                    <button type="button" class="btn-clear" onclick="clearForm()">
                        <i class="fas fa-redo"></i> Clear
                    </button>
                </div>
            </form>
            {% if prediction_text %}
            <div class="result-section">
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-info">
                                <h3>{{ prediction_text }}</h3>
                                <div class="confidence-label">
                                    Spam Confidence: <strong id="confidence">{{ confidence }}%</strong>
                                </div>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: {{confidence}}"></div>
                                </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>


    <script>
        const messageInput = document.getElementById('message');
        function clearForm() {
            messageInput.value = '';
            charCount.textContent = '0';
            resultSection.style.display = 'none';
            errorDiv.style.display = 'none';
        }
    </script>

</body>
</html>
